name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend
        env:
          # Startup gate requires an explicit value; tests exercise both
          # code paths via direct imports + dependency_overrides, so the
          # concrete value here just needs to be one of the accepted ones.
          BASEGEEK_AUTH_ENABLED: "true"
        run: pytest tests/unit/ -v

      - name: Run integration tests
        working-directory: backend
        env:
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: sqlite:///./test.db
          BASEGEEK_AUTH_ENABLED: "true"
        run: pytest tests/integration/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      # `next lint` is deprecated as of Next.js 15 and prompts interactively
      # in CI (exits 1 on no-tty). Re-enable once we migrate to the ESLint
      # CLI with a committed config per:
      # https://nextjs.org/docs/app/api-reference/config/eslint
      # - name: Lint
      #   working-directory: frontend
      #   run: npm run lint

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
