# Shared-infra compose: Postgres + Redis are provided by the datageek
# stack (datageek_postgres on 192.168.1.17:55432, datageek_redis on
# 192.168.1.17:6380 db 2). To run fully standalone, restore the
# `redis:` and `db:` services from git history c469580.

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      ROLE: backend
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      ROLE: worker
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://geekpr.clintgeek.com/api
      # basegeek SSO wiring — these are read by src/middleware.ts at the
      # edge to gate access to the dashboard. Keep in sync with the
      # backend's BASEGEEK_* config or the two layers will disagree.
      NEXT_PUBLIC_BASEGEEK_AUTH_ENABLED: "true"
      NEXT_PUBLIC_BASEGEEK_LOGIN_URL: https://basegeek.clintgeek.com/
      NEXT_PUBLIC_BASEGEEK_SESSION_COOKIE: geek_token
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
